<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina niet gevonden - Bonsai Vereniging Brabant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-content h1 {
            font-size: clamp(5rem, 15vw, 8rem);
            color: var(--color-sand);
            margin: 0;
            line-height: 1;
        }
        .error-content h2 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: var(--color-bark);
            margin-bottom: 1.5rem;
        }
        .error-content p {
            margin-bottom: 2.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <h1>404</h1>
            <h2>Oeps! Deze boom is niet gevonden.</h2>
            <p>Het lijkt erop dat de pagina die je zoekt is verplaatst of niet meer bestaat. Geen zorgen, onze bonsai groeien gewoon door!</p>
            <a href="index.html" class="cta-btn">Terug naar de homepage</a>
        </div>
    </div>
</body>
</html>
