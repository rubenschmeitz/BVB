<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina niet gevonden - Bonsai Vereniging Brabant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css?v=12">
    <link rel="icon" type="image/webp" href="images/logo_main.webp">
    <style>
        body {
            background-color: var(--color-white);
            color: var(--color-charcoal);
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background-image: url('images/textures/washi_texture.jpg');
        }
        .error-content h1 {
            font-size: clamp(5rem, 15vw, 8rem);
            color: var(--color-sand);
            margin: 0;
            line-height: 1;
        }
        .error-content h2 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: var(--color-bark);
            margin-bottom: 1.5rem;
        }
        .error-content p {
            margin-bottom: 2.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.8;
        }
        .cta-btn {
            display: inline-block;
            padding: 1rem 2rem;
            background-color: var(--color-sage);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .cta-btn:hover {
            background-color: var(--color-bark);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <h1>404</h1>
            <h2>Oeps! Deze boom is niet gevonden.</h2>
            <p>Het lijkt erop dat de pagina die je zoekt is verplaatst of niet meer bestaat. Geen zorgen, onze bonsai groeien gewoon door!</p>
            <a href="index.html" class="cta-btn">Terug naar de homepage</a>
        </div>
    </div>
</body>
</html>
